name: Build Flet APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # ARMURE PIP : Interdiction globale et absolue de compiler des paquets depuis les sources
      PIP_ONLY_BINARY: ":all:"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java (Required for Android Toolchain)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pandas openpyxl numpy==1.26.4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK via Flet
        run: |
          # Nettoyé de tout argument problématique
          flet build apk --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Excel_Analyzer_APK
          path: build/apk/**/*.apk
